name: Code Coverage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  coverage:
    name: Generate JaCoCo Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode secrets.properties
        run: printf '%s' "${{ secrets.SECRETS_PROPERTIES_BASE64 }}" | base64 --decode > secrets.properties

      - name: Generate coverage report
        run: ./gradlew createDemoDebugUnitTestCoverageReport

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: app/build/reports/coverage/test/demo/debug/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/reports/coverage/test/demo/debug/

  deploy:
    name: Publish to GitHub Pages
    needs: coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
