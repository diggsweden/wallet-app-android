name: Release Dev Workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build Android app with signing
  build:
    uses: diggsweden/reusable-ci/.github/workflows/build-gradle-android.yml@68338adeadf2e60b7d865f7e24fc195b6ff8334f # v2.8.3
    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: 68338adeadf2e60b7d865f7e24fc195b6ff8334f
      java-version: "21"
      build-module: app
      product-flavor: demo
      build-types: release
      include-aab: true
      enable-signing: true
      artifact-name-prefix: dev
      include-date-stamp: false

  # Publish to Google Play internal track
  publish-google-play:
    needs: build
    uses: diggsweden/reusable-ci/.github/workflows/publish-google-play.yml@68338adeadf2e60b7d865f7e24fc195b6ff8334f # v2.8.3
    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: 68338adeadf2e60b7d865f7e24fc195b6ff8334f
      aab-artifact-name: "dev - wallet-app-android - demo - AAB release"
      package-name: "se.digg.wallet.demo"
      track: "internal"
      status: "completed"
