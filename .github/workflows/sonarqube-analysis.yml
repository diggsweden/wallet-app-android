name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: Build and analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode secrets.properties
        run: printf '%s' "${{ secrets.SECRETS_PROPERTIES_BASE64 }}" | base64 --decode > secrets.properties

      - name: Generate coverage report
        run: ./gradlew createDemoDebugUnitTestCoverageReport --info

      - name: Run SonarQube analysis
        uses: sonarsource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} -Dsonar.projectName=${{ vars.SONAR_PROJECT_KEY }} -Dsonar.sources=app/src/main/java -Dsonar.tests=app/src/test/java,app/src/androidTest/java -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/coverage/test/**/report.xml -Dsonar.junit.reportPaths=app/build/test-results/testDemoDebugUnitTest
