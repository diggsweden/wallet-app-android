name: Release Dev Workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build Android app with signing
  build:
    uses: diggsweden/reusable-ci/.github/workflows/build-gradle-app.yml@0d87fcd4cd9550e50bfa1923b98afbed80708325 # v2.7.9
    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: v2.7.9
      java-version: "21"
      build-module: "app"
      gradle-tasks: "assembleDemoRelease bundleDemoRelease"
      enable-signing: true
      artifact-name: "wallet-android-demo"

  # Publish to Google Play internal track
  publish-google-play:
    needs: build
    uses: diggsweden/reusable-ci/.github/workflows/publish-google-play.yml@0d87fcd4cd9550e50bfa1923b98afbed80708325 # v2.7.9
    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: v2.7.9
      aab-artifact-name: "wallet-android-demo"
      package-name: "se.digg.wallet.demo"
      track: "internal"
      status: "completed"
